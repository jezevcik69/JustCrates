# =======================
# JustCrates Configuration
# =======================
# Prefix used for all plugin messages.
# =======================
prefix: "&#4498DB&lᴊ&#52A0DD&lᴜ&#61A8E0&lꜱ&#6FAFE2&lᴛ&#7EB7E5&lᴄ&#8CBFE7&lʀ&#9BC7EA&lᴀ&#A9CEEC&lᴛ&#B8D6EF&lᴇ&#C6DEF1&lꜱ &8» &f"

# =======================
# GUI Settings
# =======================
gui:
  roll:
    # Default inventory size for crate roll GUI
    default-size: 27

    # Total duration of the roll animation in ticks (20 ticks = 1 second)
    duration-ticks: 60

    # Tick interval between animation frames
    tick-interval: 2

# =======================
# Sounds
# =======================
# Sound keys used by roll/reward animations.
# Use modern namespaced sounds supported by your server version.
# =======================
sounds:
  roll: "ui.button.click"
  reward: "entity.player.levelup"

# =======================
# Hologram Settings
# =======================
hologram:
  # Maximum amount of hologram lines allowed per crate
  max-lines: 6

  # Player range in blocks where personal holograms are shown and placeholders are resolved
  view-distance: 24

  # Base height of the top hologram line above the crate block
  height-offset: 1.75

  # Fallback lines used when a crate does not define its own hologram text
  default-lines:
    - "&e%crate_name%"
    - "&7Keys: &f%keys%"
    - "&7store: &fyour.store.com"
