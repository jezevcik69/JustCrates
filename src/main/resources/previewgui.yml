# =======================
# JustCrates Preview GUI
# =======================
# This file controls crate preview inventory layout.
# Changes are applied with /crates reload.
#
# Placeholders:
# - %crate%    -> crate display name
# - %crate_id% -> crate id
#
# Notes:
# - size must be multiple of 9 (min 9, max 54)
# - slot indexes are 0-based

size: 54
title: "&8Preview - %crate%"
pane-name: " "

border:
  dark-material: BLUE_STAINED_GLASS_PANE
  accent-material: LIGHT_BLUE_STAINED_GLASS_PANE
  corner-material: CYAN_STAINED_GLASS_PANE

  accent-slots:
    - 3
    - 5
    - 9
    - 17
    - 18
    - 26
    - 27
    - 35
    - 36
    - 44

  corner-slots:
    - 0
    - 8
    - 45
    - 53

content-slots:
